model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "ldm-epoch@{epoch}-step@{step}-val_match_rate@{val/match_rate@1:.4f}"
  monitor: "val/match_rate@1"
  mode: "max"
  save_last: True

