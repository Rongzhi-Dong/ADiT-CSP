defaults:
  - model_checkpoint
  - _self_

model_checkpoint:
  dirpath: ${paths.output_dir}/checkpoints
  filename: "vae-epoch@{epoch}-step@{step}-val_match_rate@{val/match_rate:.4f}"
  monitor: "val/match_rate"
  mode: "max"
  save_last: True

early_stopping:
  monitor: "val/match_rate"
  patience: 100
  mode: "max"
